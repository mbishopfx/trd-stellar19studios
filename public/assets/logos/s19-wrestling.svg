<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Chrome / Bevel Effect -->
    <linearGradient id="chromeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#FF007F;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#800040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>

    <filter id="bevel">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.75" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litGraphic"/>
    </filter>
  </defs>

  <!-- Background Layer (Optional) -->
  <rect width="500" height="500" fill="transparent" />

  <!-- Aggressive "S" -->
  <g transform="translate(50, 100) skewX(-10)">
    <!-- Main S Shape -->
    <path d="M150,50 L50,50 L30,120 L130,120 L110,190 L10,190 L0,230 L160,230 L180,140 L80,140 L100,70 L170,70 Z" 
          fill="url(#chromeGradient)" 
          stroke="#FF007F" 
          stroke-width="4" 
          filter="url(#neonGlow)" />
    
    <!-- Sharp Serifs / Spikes -->
    <path d="M150,50 L170,30 L130,50 Z" fill="#FF007F" />
    <path d="M10,190 L-10,210 L30,190 Z" fill="#FF007F" />
  </g>

  <!-- Aggressive "19" -->
  <g transform="translate(220, 100) skewX(-10)">
    <!-- Number 1 -->
    <path d="M20,50 L60,50 L60,230 L20,230 Z" 
          fill="url(#chromeGradient)" 
          stroke="#FF007F" 
          stroke-width="4" 
          filter="url(#neonGlow)" />
    <path d="M20,50 L0,70 L20,90 Z" fill="#FF007F" />

    <!-- Number 9 -->
    <path d="M100,50 L180,50 L180,230 L140,230 L140,140 L100,140 L100,50 M140,80 L140,110 L130,110 L130,80 L140,80" 
          fill="url(#chromeGradient)" 
          stroke="#FF007F" 
          stroke-width="4" 
          filter="url(#neonGlow)" 
          fill-rule="evenodd" />
  </g>

  <!-- STELLAR19 Text at bottom -->
  <text x="250" y="420" 
        font-family="Arial Black, sans-serif" 
        font-size="48" 
        font-weight="900" 
        font-style="italic" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="5"
        filter="url(#neonGlow)">
    STELLAR<tspan fill="#FF007F">19</tspan>
  </text>
  
  <!-- "STUDIOS" Subtitle -->
  <text x="250" y="460" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="900" 
        fill="#FF007F" 
        text-anchor="middle" 
        letter-spacing="15" 
        opacity="0.8">
    STUDIOS
  </text>
</svg>
